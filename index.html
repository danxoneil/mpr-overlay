<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPR Infrastructure Site Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--ink2:#555;--ink3:#888;
  --paper:#f7f5f0;--paper2:#edeae3;--paper3:#e2dfd7;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --green:#3B6D11;--red:#A32D2D;--border:1px solid #d0cdc5;
  --radius:6px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px}
header{background:var(--ink);padding:12px 20px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
header h1{font-family:var(--mono);font-size:14px;font-weight:600;color:#fff;letter-spacing:.04em}
header p{font-family:var(--mono);font-size:11px;color:#888}
.app{display:grid;grid-template-columns:270px 1fr;height:calc(100vh - 43px);overflow:hidden}
.sidebar{background:var(--paper2);border-right:var(--border);display:flex;flex-direction:column;overflow:hidden}
.ss{padding:10px 14px;border-bottom:var(--border)}
.ss label{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px;font-family:var(--mono)}
.brow{display:flex;align-items:center;gap:8px}
.brow input[type=range]{flex:1;accent-color:var(--blue)}
.bval{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--blue);min-width:45px;text-align:right}
.msel{width:100%;padding:6px 8px;border-radius:var(--radius);border:var(--border);background:var(--paper);font-size:12px;font-family:var(--mono);color:var(--ink);cursor:pointer}
.slist{flex:1;overflow-y:auto;padding:6px}
.rgrp{margin-bottom:2px}
.rlbl{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;padding:5px 8px 2px;font-family:var(--mono)}
.si{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:var(--radius);cursor:pointer;transition:background .12s}
.si:hover{background:var(--paper3)}
.si.on{background:var(--blue-light)}
.si input{accent-color:var(--blue);width:12px;height:12px;flex-shrink:0;cursor:pointer}
.sn{font-size:11px;font-weight:500;color:var(--ink);line-height:1.3}
.sc{font-family:var(--mono);font-size:9px;color:var(--ink3)}
.sdots{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.sd{width:5px;height:5px;border-radius:50%}
.acts{padding:8px 14px;border-top:var(--border);display:flex;gap:6px;flex-shrink:0}
.btn{flex:1;padding:6px 8px;border-radius:var(--radius);border:var(--border);background:var(--paper);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--mono);color:var(--ink2);transition:background .12s}
.btn:hover{background:var(--paper3)}
.btnp{background:var(--blue);color:#fff;border-color:var(--blue);flex:2}
.btnp:hover{background:var(--blue-dark)}
.main{display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:var(--border);background:var(--paper2);flex-shrink:0}
.tab{padding:9px 16px;font-size:11px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--ink3);font-family:var(--mono);transition:all .12s;white-space:nowrap}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);background:var(--paper)}
.panel{display:none;flex:1;overflow:auto;flex-direction:column}
.panel.on{display:flex}
.mc{position:relative;flex:1;background:#ddd9d0;min-height:300px}
.mc svg{width:100%;height:100%;display:block}
.tip{position:absolute;background:var(--paper);border:var(--border);border-radius:var(--radius);padding:9px 12px;font-size:11px;pointer-events:none;display:none;z-index:20;max-width:240px;box-shadow:0 2px 10px rgba(0,0,0,.14);line-height:1.7}
.tip strong{display:block;font-size:12px;margin-bottom:4px;font-family:var(--mono);border-bottom:var(--border);padding-bottom:4px}
.tip .tr{display:flex;justify-content:space-between;gap:12px;font-size:10px}
.tip .tl{color:var(--ink3)}
.tip .tv{font-family:var(--mono);font-weight:500;color:var(--ink)}
.tip .ts{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-top:5px;margin-bottom:2px;font-family:var(--mono)}
.leg{display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:var(--border);background:var(--paper2);flex-wrap:wrap;flex-shrink:0}
.ll{font-size:10px;color:var(--ink3);font-family:var(--mono)}
.lb{display:flex;height:8px;border-radius:3px;overflow:hidden;width:100px}
.ls{flex:1}
.le{display:flex;justify-content:space-between;width:100px;font-size:9px;color:var(--ink3);font-family:var(--mono);margin-top:2px}
.dp{padding:16px;flex:1;overflow:auto}
.dp h3{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.cards{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;margin-bottom:12px}
.card{background:var(--paper2);border:var(--border);border-radius:var(--radius);padding:9px 11px}
.cn{font-size:18px;font-weight:600;color:var(--ink);font-family:var(--mono)}
.cl{font-size:9px;color:var(--ink3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;line-height:1.4}
.info{background:#E6F1FB;border:1px solid #B5D4F4;border-radius:var(--radius);padding:9px 12px;margin-bottom:12px;font-size:11px;line-height:1.6;font-family:var(--mono)}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;font-weight:600;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);padding:6px 8px;border-bottom:2px solid var(--paper3);background:var(--paper);position:sticky;top:0;white-space:nowrap;cursor:pointer}
th:hover,th.on{color:var(--blue)}
td{padding:6px 8px;border-bottom:var(--border);vertical-align:middle;white-space:nowrap}
tr:hover td{background:var(--blue-light)}
.bw{width:50px;height:5px;background:var(--paper3);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
.bf{height:100%;border-radius:3px;background:var(--blue)}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink3);gap:10px;font-family:var(--mono);font-size:12px}
.ei{font-size:32px;opacity:.25}
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;font-family:var(--mono);font-size:12px;color:var(--ink3)}
.sp{width:20px;height:20px;border:2px solid var(--paper3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.eb{background:#fcebeb;border:1px solid #f09595;border-radius:var(--radius);padding:12px 14px;font-size:11px;color:var(--red);font-family:var(--mono);line-height:1.6;margin:16px}
.cb{padding:4px 10px;border-radius:var(--radius);border:var(--border);background:var(--paper);font-size:10px;cursor:pointer;font-family:var(--mono);color:var(--ink2);float:right}
.cb:hover{background:var(--paper3)}
.sct{font-size:10px;font-family:var(--mono);color:var(--ink3);padding:4px 14px;border-bottom:var(--border)}
@media(max-width:700px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr}.sidebar{max-height:45vh}.cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

  var n=0;
  for(var i=0;i<bks.length;i++){
    var lo=bks[i][0], hi=bks[i][1], hh=g(bks[i][2]);
    if(thresh>=hi){ n+=hh; }
    else if(thresh>lo){ n+=hh*(thresh-lo)/(hi-lo); break; }
    else break;
  }
  return n;
}

async function fetchData(sites, radius){
  var url='https://api.census.gov/data/2022/acs/acs5?get=NAME,'+CENSUS_VARS+'&for=county:*&in=state:27&key='+CENSUS_KEY;
  var resp=await fetch(url);
  if(!resp.ok){ var t=await resp.text(); throw new Error('Census API '+resp.status+': '+t.slice(0,150)); }
  var raw=await resp.json();
  var h=raw[0];
  function idx(v){ return h.indexOf(v); }
  var results=[];
  for(var i=1;i<raw.length;i++){
    var row=raw[i];
    function g(v){ var j=idx(v); return j>=0?parseFloat(row[j])||0:0; }
    var fips=row[idx('county')];
    var name=row[idx('NAME')].replace(', Minnesota','');
    var cent=CENT[fips]; if(!cent) continue;
    var matched=sites.filter(function(s){ return haversine(cent[0],cent[1],s.lat,s.lon)<=radius; });
    if(!matched.length) continue;
    var pop=g('B01003_001E');
    var ru=g('B03002_001E'), wnh=g('B03002_003E');
    var m65=g('B01001_020E')+g('B01001_021E')+g('B01001_022E')+g('B01001_025E');
    var f65=g('B01001_044E')+g('B01001_045E')+g('B01001_046E')+g('B01001_049E');
    var pu=g('B17001_001E');
    var thu=g('B19001_001E');
    var ami80=HUD80[fips]||D80;
    var ami50=HUD50[fips]||D50;
    var hlmi=thu>0?lmiCount(g,ami80):0;
    var hvlmi=thu>0?lmiCount(g,ami50):0;
    var lp=thu>0?hlmi/thu*100:null;
    results.push({
      name:name, fips:fips, sites:matched.map(function(s){return s.city;}),
      pop:Math.round(pop),
      income:g('B19013_001E')||null,
      poverty:pu>0?g('B17001_002E')/pu*100:null,
      age65:pop>0?(m65+f65)/pop*100:null,
      no_internet:g('B28002_001E')>0?g('B28002_013E')/g('B28002_001E')*100:null,
      unemployed:g('B23025_003E')>0?g('B23025_005E')/g('B23025_003E')*100:null,
      renter:g('B25003_001E')>0?g('B25003_003E')/g('B25003_001E')*100:null,
      nonwhite:ru>0?(ru-wnh)/ru*100:null,
      aian:ru>0?g('B03002_005E')/ru*100:null,
      hispanic:ru>0?g('B03002_012E')/ru*100:null,
      black:ru>0?g('B03002_004E')/ru*100:null,
      asian:ru>0?g('B03002_006E')/ru*100:null,
      lmi_pct:lp,
      vlmi_pct:thu>0?hvlmi/thu*100:null,
      lmi_hh:Math.round(hlmi),
      total_hh:Math.round(thu),
      ami80:ami80,
      lmi_pass:lp!=null?(lp>=51?'Pass':'Fail'):'—',
    });
  }
  return results;
}

function drawMap(sites, data){
  var mk=document.getElementById('metSel').value;
  var mc2=METRICS[mk];
  var svgEl=document.getElementById('ms'); svgEl.style.display='block';
  var cont=document.getElementById('mc');
  var W=cont.offsetWidth||700, H=cont.offsetHeight||440;
  svgEl.setAttribute('viewBox','0 0 '+W+' '+H);
  var svg=d3.select('#ms'); svg.selectAll('*').remove();
  var proj=d3.geoMercator().center([-93.0,46.2]).scale(3800*(W/740)).translate([W/2,H/2]);
  var path=d3.geoPath(proj);
  var vals=data.map(function(c){return c[mk];}).filter(function(v){return v!=null;});
  var vMin=d3.min(vals)||0, vMax=d3.max(vals)||1;
  var cs=d3.scaleSequential([vMin,vMax],mc2.scheme);
  var tip=document.getElementById('tip');
  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json').then(function(us){
    var mnF=topojson.feature(us,us.objects.counties).features.filter(function(f){return String(f.id).padStart(5,'0').startsWith('27');});
    svg.selectAll('.co').data(mnF).join('path').attr('d',path)
      .attr('fill',function(d){
        var fips=String(d.id).padStart(5,'0').slice(2);
        var cd=data.find(function(c){return c.fips===fips;});
        return cd&&cd[mk]!=null?cs(cd[mk]):'#d4d0c8';
      })
      .attr('stroke','#fff').attr('stroke-width',0.5)
      .on('mousemove',function(e,d){
        var fips=String(d.id).padStart(5,'0').slice(2);
        var cd=data.find(function(c){return c.fips===fips;});
        if(!cd) return;
        tip.style.display='block';
        tip.style.left=Math.min(e.offsetX+14,W-250)+'px';
        tip.style.top=Math.max(e.offsetY-10,4)+'px';
        function fmt(v,fn){return v!=null?fn(v):'&mdash;';}
        var passColor=cd.lmi_pass==='Pass'?'#3B6D11':'#A32D2D';
        tip.innerHTML='<strong>'+cd.name+' County</strong>'+
          '<div class="ts">Economic</div>'+
          '<div class="tr"><span class="tl">Population</span><span class="tv">'+cd.pop.toLocaleString()+'</span></div>'+
          '<div class="tr"><span class="tl">Median income</span><span class="tv">'+fmt(cd.income,function(v){return '$'+Math.round(v).toLocaleString();})+'</span></div>'+
          '<div class="tr"><span class="tl">Poverty rate</span><span class="tv">'+fmt(cd.poverty,function(v){return v.toFixed(1)+'%';})+'</span></div>'+
          '<div class="tr"><span class="tl">Unemployment</span><span class="tv">'+fmt(cd.unemployed,function(v){return v.toFixed(1)+'%';})+'</span></div>'+
          '<div class="tr"><span class="tl">No internet</span><span class="tv">'+fmt(cd.no_internet,function(v){return v.toFixed(1)+'%';})+'</span></div>'+
          '<div class="tr"><span class="tl">Renter-occ.</span><span class="tv">'+fmt(cd.renter,function(v){return v.toFixed(1)+'%';})+'</span></div>'+
          '<div class="tr"><span class="tl">Age 65+</span><span class="tv">'+fmt(cd.age65,function(v){return v.toFixed(1)+'%';})+'</span></div>'+
          '<div class="ts">Race / Ethnicity</div>'+
          '<div class="tr"><span class="tl">Non-white</span><span class="tv">'+fmt(cd.nonwhite,function(v){return v.toFixed(1)+'%';})+'</span></div>'+
          '<div class="tr"><span class="tl">AIAN</span><span class="tv">'+fmt(cd.aian,function(v){return v.toFixed(2)+'%';})+'</span></div>'+
          '<div class="tr"><span class="tl">Hispanic/Latino</span><span class="tv">'+fmt(cd.hispanic,function(v){return v.toFixed(1)+'%';})+'</span></div>'+
          '<div class="tr"><span class="tl">Black/AA</span><span class="tv">'+fmt(cd.black,function(v){return v.toFixed(1)+'%';})+'</span></div>'+
          '<div class="ts">HUD LMI (80% AMI = $'+cd.ami80.toLocaleString()+')</div>'+
          '<div class="tr"><span class="tl">51% threshold</span><span class="tv" style="color:'+passColor+'">'+cd.lmi_pass+'</span></div>'+
          '<div class="tr"><span class="tl">LMI households</span><span class="tv">'+fmt(cd.lmi_pct,function(v){return v.toFixed(1)+'%';})+'</span></div>'+
          '<div class="tr"><span class="tl">LMI count</span><span class="tv">'+(cd.lmi_hh!=null?cd.lmi_hh.toLocaleString():'&mdash;')+'</span></div>'+
          '<div style="margin-top:5px;font-size:9px;color:var(--ink3)">'+cd.sites.join(', ')+'</div>';
      })
      .on('mouseleave',function(){ tip.style.display='none'; });
    sites.forEach(function(site){
      var xy=proj([site.lon,site.lat]);
      var cx=xy[0], cy=xy[1];
      var ex=proj([site.lon+mi2deg(bufMi),site.lat]);
      var r=Math.abs(ex[0]-cx);
      svg.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r)
        .attr('fill','rgba(24,95,165,0.06)').attr('stroke','rgba(24,95,165,0.35)').attr('stroke-width',1).attr('stroke-dasharray','5,3');
    });
    sites.forEach(function(site){
      var xy=proj([site.lon,site.lat]);
      svg.append('circle').attr('cx',xy[0]).attr('cy',xy[1]).attr('r',site.flagship?9:6)
        .attr('fill',site.flagship?'#533AB7':'#185FA5').attr('stroke','#fff').attr('stroke-width',2);
      svg.append('text').attr('x',xy[0]).attr('y',xy[1]-12).attr('text-anchor','middle')
        .attr('font-size',9).attr('font-family','IBM Plex Mono,monospace').attr('fill','#1a1a1a').attr('font-weight',500)
        .text(site.city.split('/')[0]);

    }
    document.getElementById('lt').textContent=mc2.label;
    document.getElementById('ll').textContent=mc2.fmt(vMin);
    document.getElementById('lh').textContent=mc2.fmt(vMax);
    document.getElementById('leg').style.display='flex';
  });
}

function drawTable(sites, data){
  if(!data.length){ document.getElementById('dc').innerHTML='<div class="es"><div class="ei">&#9638;</div><div>No counties in range.</div></div>'; return; }
  var totalPop=data.reduce(function(s,c){return s+c.pop;},0);
  function wavg(k){ var v=data.filter(function(c){return c[k]!=null;}); return v.length?v.reduce(function(s,c){return s+c[k]*c.pop;},0)/v.reduce(function(s,c){return s+c.pop;},0):null; }
  var wi=wavg('income'), wp=wavg('poverty'), wl=wavg('lmi_pct');
  var lpass=wl!=null&&wl>=51;
  var lbg=wl==null?'var(--paper2)':lpass?'#EAF3DE':'#FCEBEB';
  var lbc=wl==null?'#d0cdc5':lpass?'#3B6D11':'#A32D2D';
  var lnote=wl==null?'':lpass?'<span style="color:#3B6D11;font-size:9px">&#10003; Meets 51% threshold</span>':'<span style="color:#A32D2D;font-size:9px">&#10007; Below 51% threshold</span>';

  var cols=[
    {k:'name',     lb:'County',          bar:false, special:'name'},
    {k:'income',   lb:'Med. Income',     bar:false, fmt:function(v){return v?'$'+Math.round(v).toLocaleString():'&mdash;';}},
    {k:'lmi_pass', lb:'51% Test',        bar:false, special:'pass'},
    {k:'lmi_pct',  lb:'LMI % (80% AMI)',bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'vlmi_pct', lb:'Very LMI % (50%)',bar:true, fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'poverty',  lb:'Poverty %',       bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'unemployed',lb:'Unemp. %',       bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'no_internet',lb:'No Internet %', bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'renter',   lb:'Renter %',        bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'age65',    lb:'Age 65+ %',       bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'nonwhite', lb:'Non-white %',     bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'aian',     lb:'AIAN %',          bar:true,  fmt:function(v){return v!=null?v.toFixed(2)+'%':'&mdash;';}},
    {k:'hispanic', lb:'Hispanic %',      bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'black',    lb:'Black/AA %',      bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'asian',    lb:'Asian %',         bar:true,  fmt:function(v){return v!=null?v.toFixed(1)+'%':'&mdash;';}},
    {k:'lmi_hh',   lb:'LMI Households',  bar:false, fmt:function(v){return v!=null?v.toLocaleString():'&mdash;';}},
    {k:'ami80',    lb:'80% AMI ($)',      bar:false, fmt:function(v){return v?'$'+v.toLocaleString():'&mdash;';}},
    {k:'pop',      lb:'Population',       bar:false, fmt:function(v){return v.toLocaleString();}},
    {k:'sites',    lb:'Sites',            bar:false, fmt:function(v){return v.join(', ');}, nosort:true},
  ];

  var maxes={};
  cols.forEach(function(c){ if(c.bar) maxes[c.k]=Math.max.apply(null,data.map(function(r){return r[c.k]||0;})); });

  function sorted(){
    return data.slice().sort(function(a,b){
      var av=a[sortK], bv=b[sortK];
      if(av==null) return 1; if(bv==null) return -1;
      if(typeof av==='string') return sortD*av.localeCompare(bv);
      return sortD*(av-bv);
    });
  }

  function rows(d){
    return d.map(function(c){
      var cells=cols.map(function(col){
        var v=c[col.k];
        if(col.special==='name') return '<td style="font-weight:500">'+v+'</td>';
        if(col.special==='pass'){
          var pc=v==='Pass'?'#3B6D11':'#A32D2D';
          return '<td style="font-weight:600;color:'+pc+';font-family:var(--mono);font-size:10px">'+(v||'&mdash;')+'</td>';
        }
        var f=col.fmt?col.fmt(v):(v!=null?v:'&mdash;');
        if(col.bar&&v!=null&&maxes[col.k]>0){
          var p=Math.round(v/maxes[col.k]*100);
          return '<td><span class="bw"><span class="bf" style="width:'+p+'%"></span></span>'+f+'</td>';
        }
        return '<td style="font-family:var(--mono);font-size:10px">'+f+'</td>';
      });
      return '<tr>'+cells.join('')+'</tr>';
    }).join('');
  }

  function thead(){
    return cols.map(function(c){
      var on=c.k===sortK?' on':'';
      var arr=c.k===sortK?(sortD>0?' &uarr;':' &darr;'):'';
      var onclick=c.nosort?'':'onclick="doSort(\''+c.k+'\')"';
      var cur=c.nosort?'cursor:default':'';
      return '<th class="'+on+'" '+onclick+' style="'+cur+'">'+c.lb+arr+'</th>';
    }).join('');
  }

  window.doSort=function(k){
    if(sortK===k) sortD*=-1; else{sortK=k;sortD=-1;}
    var tb=document.getElementById('tb');
    if(tb) tb.innerHTML=rows(sorted());
    document.querySelectorAll('table th').forEach(function(th,i){
      var c=cols[i];
      th.className=c.k===sortK?'on':'';
      th.innerHTML=c.lb+(c.k===sortK?(sortD>0?' &uarr;':' &darr;'):'');
      if(!c.nosort) th.onclick=function(){doSort(c.k);};
    });
  };

  var html='<h3>'+sites.length+' site'+(sites.length!==1?'s':'')+' &middot; '+bufMi+'-mi buffer &middot; '+data.length+' counties <button class="cb" onclick="copyTSV()">Copy TSV</button></h3>';
  html+='<div class="info"><strong style="color:#0C447C">HUD CDBG/EDI LMI National Objective &mdash; 51% threshold</strong><br>';
  html+='<span style="color:#185FA5">Service Area:</span> &ge;51% of residents LMI (below 80% AMI) &nbsp;&middot;&nbsp; ';
  html+='<span style="color:#185FA5">Job Creation:</span> &ge;51% of jobs available to LMI persons &nbsp;&middot;&nbsp; ';
  html+='<span style="color:#185FA5">Limited Clientele:</span> project exclusively serves LMI-qualified group</div>';
  html+='<div class="cards">';
  html+='<div class="card"><div class="cn">'+data.length+'</div><div class="cl">Counties in service area</div></div>';
  html+='<div class="card"><div class="cn">'+(totalPop/1000000).toFixed(2)+'M</div><div class="cl">Total population</div></div>';
  html+='<div class="card"><div class="cn">'+(wi?'$'+Math.round(wi/1000)+'k':'&mdash;')+'</div><div class="cl">Wtd. avg median income</div></div>';
  html+='<div class="card"><div class="cn">'+(wp?wp.toFixed(1)+'%':'&mdash;')+'</div><div class="cl">Wtd. avg poverty rate</div></div>';
  html+='<div class="card" style="background:'+lbg+';border-color:'+lbc+'"><div class="cn">'+(wl?wl.toFixed(1)+'%':'&mdash;')+'</div><div class="cl">Wtd. avg LMI (80% AMI)<br>'+lnote+'</div></div>';
  html+='</div>';
  html+='<div style="overflow-x:auto"><table><thead><tr>'+thead()+'</tr></thead><tbody id="tb">'+rows(sorted())+'</tbody></table></div>';
  document.getElementById('dc').innerHTML=html;
}

window.copyTSV=function(){
  if(!lastData) return;
  var h=['County','Med. Income','51% Test','LMI % (80%AMI)','Very LMI % (50%AMI)','Poverty %','Unemp. %','No Internet %','Renter %','Age 65+ %','Non-white %','AIAN %','Hispanic %','Black/AA %','Asian %','LMI Households','80% AMI','Population','Sites'];
  var r=lastData.map(function(c){return [
    c.name, c.income?'$'+Math.round(c.income):'', c.lmi_pass,
    c.lmi_pct?c.lmi_pct.toFixed(1)+'%':'', c.vlmi_pct?c.vlmi_pct.toFixed(1)+'%':'',
    c.poverty?c.poverty.toFixed(1)+'%':'', c.unemployed?c.unemployed.toFixed(1)+'%':'',
    c.no_internet?c.no_internet.toFixed(1)+'%':'', c.renter?c.renter.toFixed(1)+'%':'',
    c.age65?c.age65.toFixed(1)+'%':'', c.nonwhite?c.nonwhite.toFixed(1)+'%':'',
    c.aian?c.aian.toFixed(2)+'%':'', c.hispanic?c.hispanic.toFixed(1)+'%':'',
    c.black?c.black.toFixed(1)+'%':'', c.asian?c.asian.toFixed(1)+'%':'',
    c.lmi_hh||'', c.ami80?'$'+c.ami80:'', c.pop, c.sites.join('; ')
  ];});
  navigator.clipboard.writeText([h].concat(r).map(function(row){return row.join('\t');}).join('\n')).then(function(){
    var b=document.querySelector('.cb'); if(b){b.textContent='Copied!'; setTimeout(function(){b.textContent='Copy TSV';},1500);}
  });
};
