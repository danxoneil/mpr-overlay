<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPR Infrastructure Site Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--ink2:#555;--ink3:#888;
  --paper:#f7f5f0;--paper2:#edeae3;--paper3:#e2dfd7;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --red:#A32D2D;--border:1px solid #d0cdc5;
  --radius:6px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px}
header{background:var(--ink);padding:12px 20px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
header h1{font-family:var(--mono);font-size:14px;font-weight:600;color:#fff;letter-spacing:.04em}
header p{font-family:var(--mono);font-size:11px;color:#888}
.app{display:grid;grid-template-columns:270px 1fr;height:calc(100vh - 43px);overflow:hidden}
.sidebar{background:var(--paper2);border-right:var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:10px 14px;border-bottom:var(--border)}
.sidebar-section label{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px;font-family:var(--mono)}
.buffer-row{display:flex;align-items:center;gap:8px}
.buffer-row input[type=range]{flex:1;accent-color:var(--blue)}
.buffer-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--blue);min-width:45px;text-align:right}
.metric-select{width:100%;padding:6px 8px;border-radius:var(--radius);border:var(--border);background:var(--paper);font-size:12px;font-family:var(--mono);color:var(--ink);cursor:pointer}
.sites-list{flex:1;overflow-y:auto;padding:6px}
.region-group{margin-bottom:2px}
.region-label{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;padding:5px 8px 2px;font-family:var(--mono)}
.site-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:var(--radius);cursor:pointer;transition:background .12s}
.site-item:hover{background:var(--paper3)}
.site-item.checked{background:var(--blue-light)}
.site-item input[type=checkbox]{accent-color:var(--blue);width:12px;height:12px;flex-shrink:0;cursor:pointer}
.site-name{font-size:11px;font-weight:500;color:var(--ink);line-height:1.3}
.site-call{font-family:var(--mono);font-size:9px;color:var(--ink3)}
.svc-dots{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.svc-dot{width:5px;height:5px;border-radius:50%}
.select-actions{padding:8px 14px;border-top:var(--border);display:flex;gap:6px;flex-shrink:0}
.btn-sm{flex:1;padding:6px 8px;border-radius:var(--radius);border:var(--border);background:var(--paper);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--mono);color:var(--ink2);transition:background .12s}
.btn-sm:hover{background:var(--paper3)}
.btn-run{background:var(--blue);color:#fff;border-color:var(--blue);flex:2}
.btn-run:hover{background:var(--blue-dark)}
.main{display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:var(--border);background:var(--paper2);flex-shrink:0}
.tab{padding:9px 16px;font-size:11px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--ink3);font-family:var(--mono);transition:all .12s;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--paper)}
.panel{display:none;flex:1;overflow:auto;flex-direction:column}
.panel.active{display:flex}
.map-container{position:relative;flex:1;background:#ddd9d0;min-height:300px}
.map-container svg{width:100%;height:100%;display:block}
.map-tip{position:absolute;background:var(--paper);border:var(--border);border-radius:var(--radius);padding:9px 12px;font-size:11px;pointer-events:none;display:none;z-index:20;max-width:230px;box-shadow:0 2px 10px rgba(0,0,0,.14);line-height:1.7}
.map-tip strong{display:block;font-size:12px;margin-bottom:4px;font-family:var(--mono);border-bottom:var(--border);padding-bottom:4px}
.map-tip .tip-row{display:flex;justify-content:space-between;gap:12px;font-size:10px}
.map-tip .tip-label{color:var(--ink3)}
.map-tip .tip-val{font-family:var(--mono);font-weight:500;color:var(--ink)}
.map-tip .tip-section{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-top:5px;margin-bottom:2px;font-family:var(--mono)}
.map-legend{display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:var(--border);background:var(--paper2);flex-wrap:wrap;flex-shrink:0}
.legend-label{font-size:10px;color:var(--ink3);font-family:var(--mono)}
.legend-bar{display:flex;height:8px;border-radius:3px;overflow:hidden;width:100px}
.legend-seg{flex:1}
.legend-ends{display:flex;justify-content:space-between;width:100px;font-size:9px;color:var(--ink3);font-family:var(--mono);margin-top:2px}
.data-panel{padding:16px;flex:1;overflow:auto}
.data-panel h3{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.summary-cards{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;margin-bottom:14px}
.scard{background:var(--paper2);border:var(--border);border-radius:var(--radius);padding:9px 11px}
.scard-n{font-size:18px;font-weight:600;color:var(--ink);font-family:var(--mono)}
.scard-l{font-size:9px;color:var(--ink3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;line-height:1.4}
.data-table{width:100%;border-collapse:collapse;font-size:11px}
.data-table th{text-align:left;font-weight:600;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);padding:6px 8px;border-bottom:2px solid var(--paper3);background:var(--paper);position:sticky;top:0;white-space:nowrap;cursor:pointer}
.data-table th:hover{color:var(--blue)}
.data-table th.sorted{color:var(--blue)}
.data-table td{padding:6px 8px;border-bottom:var(--border);vertical-align:middle;white-space:nowrap}
.data-table tr:hover td{background:var(--blue-light)}
.bar-wrap{width:50px;height:5px;background:var(--paper3);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
.bar-fill{height:100%;border-radius:3px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink3);gap:10px;font-family:var(--mono);font-size:12px}
.empty-icon{font-size:32px;opacity:.25}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;font-family:var(--mono);font-size:12px;color:var(--ink3)}
.spinner{width:20px;height:20px;border:2px solid var(--paper3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fcebeb;border:1px solid #f09595;border-radius:var(--radius);padding:12px 14px;font-size:11px;color:var(--red);font-family:var(--mono);line-height:1.6;margin:16px}
.copy-btn{padding:4px 10px;border-radius:var(--radius);border:var(--border);background:var(--paper);font-size:10px;cursor:pointer;font-family:var(--mono);color:var(--ink2);float:right}
.copy-btn:hover{background:var(--paper3)}
.site-count{font-size:10px;font-family:var(--mono);color:var(--ink3);padding:4px 14px;border-bottom:var(--border)}
@media(max-width:700px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr}.sidebar{max-height:45vh}.summary-cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <h1>MPR Infrastructure Site Analysis</h1>
  <p>ACS 2022 5-Year Estimates · County-level demographics · FY2027 Congressionally Directed Funding</p>
</header>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-section">
      <label>Coverage buffer radius</label>

        <span class="buffer-val" id="bufferVal">30 mi</span>

    </div>
    <div class="sidebar-section">
      <label>Map color metric</label>

        <option value="poverty">Poverty rate (%)</option>
        <option value="no_internet">No internet access (%)</option>
        <option value="unemployed">Unemployment rate (%)</option>
        <option value="renter">Renter-occupied housing (%)</option>
        <option value="age65">Population age 65+ (%)</option>
        <option value="nonwhite">Non-white population (%)</option>
        <option value="aian">American Indian / Alaska Native (%)</option>
        <option value="hispanic">Hispanic or Latino (%)</option>
        <option value="black">Black / African American (%)</option>
        <option value="asian">Asian (%)</option>
        <option value="lmi_pct">LMI households — below 80% AMI (%)</option>
        <option value="vlmi_pct">Very LMI households — below 50% AMI (%)</option>

      <button class="btn-sm btn-run" onclick="runAnalysis()">Analyze ↗</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs">
      <div class="tab active" onclick="showTab('map')">Map view</div>
      <div class="tab" onclick="showTab('data')">Data table</div>
    </div>
    <div class="panel active" id="panel-map">

      </div>
    </div>
    <div class="panel" id="panel-data">
      <div class="data-panel" id="dataContent">
        <div class="empty-state"><div class="empty-icon">▦</div><div>Run analysis to see county data</div></div>
      </div>
    </div>
  </div>
</div>

<script>

const REGIONS=[...new Set(SITES.map(s=>s.region))];

// Single Census API call — 27 data vars + NAME + state + county = 30 total (well under 50 limit)
const CENSUS_VARS = [

].join(',');

  income:    {label:'Median HH income',           fmt:v=>'$'+Math.round(v).toLocaleString(), scheme:d3.interpolateBlues},

// Metro counties have higher limits; non-metro default ~$70,550

function getAMI80(fips){ return HUD_80_AMI[fips]||HUD_80_AMI_DEFAULT; }
function getAMI50(fips){ return HUD_50_AMI[fips]||HUD_50_AMI_DEFAULT; }

// Estimate households below an income threshold using B19001 brackets
// Brackets: <10k,10-15,15-20,20-25,25-30,30-35,35-40,40-45,45-50,50-60,60-75,75-100,100-125,125-150,150-200,200+
function hhBelowThreshold(g, threshold){
  const brackets = [
    [0,    10000,  g('B19001_002E')],
    [10000,15000,  g('B19001_003E')],
    [15000,20000,  g('B19001_004E')],
    [20000,25000,  g('B19001_005E')],
    [25000,30000,  g('B19001_006E')],
    [30000,35000,  g('B19001_007E')],
    [35000,40000,  g('B19001_008E')],
    [40000,45000,  g('B19001_009E')],
    [45000,50000,  g('B19001_010E')],
    [50000,60000,  g('B19001_011E')],
    [60000,75000,  g('B19001_012E')],
    [75000,100000, g('B19001_013E')],
    [100000,125000,g('B19001_014E')],
    [125000,150000,g('B19001_015E')],
    [150000,200000,g('B19001_016E')],
    [200000,1e9,   g('B19001_017E')],
  ];
  let count = 0;
  for(const [lo,hi,hh] of brackets){
    if(threshold >= hi){ count += hh; }
    else if(threshold > lo){ count += hh * (threshold-lo)/(hi-lo); }
    else break;
  }
  return count;
}

function pointInCircle(lat,lon,cLat,cLon,mi){
  const R=3958.8,dLa=(lat-cLat)*Math.PI/180,dLo=(lon-cLon)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(cLat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))<=mi;
}
function milesToDeg(m){return m/69;}

async function fetchCensusData(selectedSites,radiusMi){
  const url=`https://api.census.gov/data/2022/acs/acs5?get=NAME,${CENSUS_VARS}&for=county:*&in=state:27&key=${CENSUS_KEY}`;
  const resp=await fetch(url);
  if(!resp.ok){const txt=await resp.text();throw new Error(`Census API ${resp.status}: ${txt.slice(0,200)}`);}
  const raw=await resp.json();
  const h=raw[0];
  function idx(v){return h.indexOf(v);}
  const results=[];
  raw.slice(1).forEach(row=>{
    function g(v){const i=idx(v);return i>=0?parseFloat(row[i])||0:0;}
    const fips=row[idx('county')];
    const name=row[idx('NAME')].replace(', Minnesota','');
    const centroid=MN_COUNTY_CENTROIDS[fips];
    if(!centroid)return;
    const matchedSites=selectedSites.filter(s=>pointInCircle(centroid[0],centroid[1],s.lat,s.lon,radiusMi));
    if(!matchedSites.length)return;
    const pop=g('B01003_001E');
    const race_u=g('B03002_001E'), white_nh=g('B03002_003E');
    const m65=g('B01001_020E')+g('B01001_021E')+g('B01001_022E')+g('B01001_025E');
    const f65=g('B01001_044E')+g('B01001_045E')+g('B01001_046E')+g('B01001_049E');
    const pov_u=g('B17001_001E');
    const total_hh = g('B19001_001E');
    const ami80 = getAMI80(fips);
    const ami50 = getAMI50(fips);
    const hh_lmi  = total_hh>0 ? hhBelowThreshold(g, ami80) : 0;
    const hh_vlmi = total_hh>0 ? hhBelowThreshold(g, ami50) : 0;
    results.push({
      name, fips, sites:matchedSites.map(s=>s.city),
      pop:          Math.round(pop),
      income:       g('B19013_001E')||null,
      poverty:      pov_u>0?g('B17001_002E')/pov_u*100:null,
      age65:        pop>0?(m65+f65)/pop*100:null,
      no_internet:  g('B28002_001E')>0?g('B28002_013E')/g('B28002_001E')*100:null,
      unemployed:   g('B23025_003E')>0?g('B23025_005E')/g('B23025_003E')*100:null,
      renter:       g('B25003_001E')>0?g('B25003_003E')/g('B25003_001E')*100:null,
      nonwhite:     race_u>0?(race_u-white_nh)/race_u*100:null,
      aian:         race_u>0?g('B03002_005E')/race_u*100:null,
      hispanic:     race_u>0?g('B03002_012E')/race_u*100:null,
      black:        race_u>0?g('B03002_004E')/race_u*100:null,
      asian:        race_u>0?g('B03002_006E')/race_u*100:null,
      lmi_pct:      total_hh>0?hh_lmi/total_hh*100:null,
      vlmi_pct:     total_hh>0?hh_vlmi/total_hh*100:null,
      lmi_pass:     total_hh>0?(hh_lmi/total_hh*100>=51?'✓ Pass':'✗ Fail'):'—',
      lmi_hh:       Math.round(hh_lmi),
      vlmi_hh:      Math.round(hh_vlmi),
      total_hh:     Math.round(total_hh),
      ami80,
    });
  });
  return results;
}

async function runAnalysis(){
  if(!selected.size){alert('Please select at least one site.');return;}
  const selectedSites=SITES.filter(s=>selected.has(s.id));
  showTab('map');
  document.getElementById('mapEmpty').style.display='none';
  document.getElementById('mapSvg').style.display='none';
  document.getElementById('mapLegend').style.display='none';
  const container=document.getElementById('mapContainer');
  let ld=document.getElementById('mapLoading');
  if(!ld){ld=document.createElement('div');ld.id='mapLoading';ld.className='loading-state';ld.innerHTML='<div class="spinner"></div><span style="font-size:11px">Fetching Census ACS 2022 data…</span>';container.appendChild(ld);}
  ld.style.display='flex';
  document.getElementById('dataContent').innerHTML='<div class="loading-state" style="height:200px"><div class="spinner"></div></div>';
  try{
    const data=await fetchCensusData(selectedSites,bufferMiles);
    lastResults=data; ld.style.display='none';
    redrawMap(selectedSites,data);
    renderTable(selectedSites,data);
  }catch(e){
    ld.style.display='none';
    document.getElementById('mapEmpty').style.display='flex';
    document.getElementById('mapEmpty').innerHTML=`<div style="font-size:22px;opacity:.3">!</div><div style="color:#A32D2D;font-family:var(--mono);font-size:11px;text-align:center;max-width:300px">${e.message}</div>`;
    document.getElementById('dataContent').innerHTML=`<div class="error-box">${e.message}</div>`;
  }
}

function redrawMap(selectedSites,data){
  const mk=document.getElementById('metricSelect').value;
  const mc=METRIC_CONFIG[mk];
  const svgEl=document.getElementById('mapSvg'); svgEl.style.display='block';
  const container=document.getElementById('mapContainer');
  const W=container.offsetWidth||700, H=container.offsetHeight||440;
  svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const svg=d3.select('#mapSvg'); svg.selectAll('*').remove();
  const proj=d3.geoMercator().center([-93.0,46.2]).scale(3800*(W/740)).translate([W/2,H/2]);
  const path=d3.geoPath(proj);
  const vals=data.map(c=>c[mk]).filter(v=>v!=null);
  const vMin=d3.min(vals)||0, vMax=d3.max(vals)||1;
  const colorScale=d3.scaleSequential([vMin,vMax],mc.scheme);
  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json').then(us=>{
    const mnF=topojson.feature(us,us.objects.counties).features.filter(f=>String(f.id).padStart(5,'0').startsWith('27'));
    svg.selectAll('.co').data(mnF).join('path').attr('d',path)
      .attr('fill',d=>{const fips=String(d.id).padStart(5,'0').slice(2);const cd=data.find(c=>c.fips===fips);return cd&&cd[mk]!=null?colorScale(cd[mk]):'#d4d0c8';})
      .attr('stroke','#fff').attr('stroke-width',0.5)
      .on('mousemove',function(e,d){
        const fips=String(d.id).padStart(5,'0').slice(2);
        const cd=data.find(c=>c.fips===fips); if(!cd)return;
        const tip=document.getElementById('mapTip');
        tip.style.display='block';
        tip.style.left=Math.min(e.offsetX+14,W-240)+'px';
        tip.style.top=Math.max(e.offsetY-10,4)+'px';
        const fmt=(v,fn)=>v!=null?fn(v):'—';
        tip.innerHTML=`<strong>${cd.name} County</strong>
          <div class="tip-section">Economic</div>
          <div class="tip-row"><span class="tip-label">Population</span><span class="tip-val">${cd.pop.toLocaleString()}</span></div>
          <div class="tip-row"><span class="tip-label">Median income</span><span class="tip-val">${fmt(cd.income,v=>'$'+Math.round(v).toLocaleString())}</span></div>

          <div class="tip-row"><span class="tip-label">Age 65+</span><span class="tip-val">${fmt(cd.age65,v=>v.toFixed(1)+'%')}</span></div>
          <div class="tip-section">Race / Ethnicity</div>
          <div class="tip-row"><span class="tip-label">Non-white</span><span class="tip-val">${fmt(cd.nonwhite,v=>v.toFixed(1)+'%')}</span></div>
          <div class="tip-row"><span class="tip-label">AIAN</span><span class="tip-val">${fmt(cd.aian,v=>v.toFixed(2)+'%')}</span></div>
          <div class="tip-row"><span class="tip-label">Hispanic/Latino</span><span class="tip-val">${fmt(cd.hispanic,v=>v.toFixed(1)+'%')}</span></div>
          <div class="tip-row"><span class="tip-label">Black/AA</span><span class="tip-val">${fmt(cd.black,v=>v.toFixed(1)+'%')}</span></div>
          <div class="tip-row"><span class="tip-label">Asian</span><span class="tip-val">${fmt(cd.asian,v=>v.toFixed(1)+'%')}</span></div>

          <div class="tip-row"><span class="tip-label">LMI households</span><span class="tip-val">${fmt(cd.lmi_pct,v=>v.toFixed(1)+'%')}</span></div>

    document.getElementById('legendLow').textContent=mc.fmt(vMin);

  });

function renderTable(selectedSites,data){
  if(!data.length){document.getElementById('dataContent').innerHTML='<div class="empty-state"><div class="empty-icon">▦</div><div>No counties in range.</div></div>';return;}
  const totalPop=data.reduce((s,c)=>s+c.pop,0);
  const wavg=(key)=>{const v=data.filter(c=>c[key]!=null);return v.length?v.reduce((s,c)=>s+c[key]*c.pop,0)/v.reduce((s,c)=>s+c.pop,0):null;};
  const cols=[
    {key:'name',       label:'County',        fmt:v=>v,                                        sort:true},
    {key:'income',     label:'Med. Income',   fmt:v=>v?'$'+Math.round(v).toLocaleString():'—', sort:true},
    {key:'poverty',    label:'Poverty %',     fmt:v=>v!=null?v.toFixed(1)+'%':'—',             sort:true, bar:true},
    {key:'unemployed', label:'Unemp. %',      fmt:v=>v!=null?v.toFixed(1)+'%':'—',             sort:true, bar:true},
    {key:'no_internet',label:'No Internet %', fmt:v=>v!=null?v.toFixed(1)+'%':'—',             sort:true, bar:true},
    {key:'renter',     label:'Renter %',      fmt:v=>v!=null?v.toFixed(1)+'%':'—',             sort:true, bar:true},
    {key:'age65',      label:'Age 65+ %',     fmt:v=>v!=null?v.toFixed(1)+'%':'—',             sort:true, bar:true},
    {key:'nonwhite',   label:'Non-white %',   fmt:v=>v!=null?v.toFixed(1)+'%':'—',             sort:true, bar:true},
    {key:'aian',       label:'AIAN %',        fmt:v=>v!=null?v.toFixed(2)+'%':'—',             sort:true, bar:true},
    {key:'hispanic',   label:'Hispanic %',    fmt:v=>v!=null?v.toFixed(1)+'%':'—',             sort:true, bar:true},
    {key:'black',      label:'Black/AA %',    fmt:v=>v!=null?v.toFixed(1)+'%':'—',             sort:true, bar:true},
    {key:'asian',      label:'Asian %',       fmt:v=>v!=null?v.toFixed(1)+'%':'—',             sort:true, bar:true},
    {key:'lmi_pass',   label:'51% Test',       fmt:v=>v,                                        sort:true},
    {key:'lmi_pct',    label:'LMI % (80% AMI)',fmt:v=>v!=null?v.toFixed(1)+'%':'—',            sort:true, bar:true},
    {key:'vlmi_pct',   label:'Very LMI % (50%)',fmt:v=>v!=null?v.toFixed(1)+'%':'—',           sort:true, bar:true},
    {key:'lmi_hh',     label:'LMI Households', fmt:v=>v!=null?v.toLocaleString():'—',          sort:true},
    {key:'ami80',      label:'80% AMI ($)',    fmt:v=>v?'$'+v.toLocaleString():'—',             sort:true},
    {key:'pop',        label:'Population',    fmt:v=>v.toLocaleString(),                        sort:true},
    {key:'sites',      label:'Sites',         fmt:v=>v.join(', '),                              sort:false},
  ];
  const maxes={};
  cols.filter(c=>c.bar).forEach(c=>{maxes[c.key]=Math.max(...data.map(r=>r[c.key]||0));});
  function getSorted(){return [...data].sort((a,b)=>{const av=a[sortCol],bv=b[sortCol];if(av==null)return 1;if(bv==null)return -1;return typeof av==='string'?sortDir*av.localeCompare(bv):sortDir*(av-bv);});}
  function makeRows(sorted){return sorted.map(c=>`<tr>${cols.map(col=>{const v=c[col.key];const f=col.fmt(v);if(col.bar&&v!=null&&maxes[col.key]>0){const p=Math.round(v/maxes[col.key]*100);return `<td><span class="bar-wrap"><span class="bar-fill" style="width:${p}%;background:#185FA5"></span></span>${f}</td>`;}if(col.key==='lmi_pass'){const pass=v&&v.includes('✓');return `<td style="font-weight:600;color:${pass?'#3B6D11':'#A32D2D'};font-family:var(--mono);font-size:10px">${f}</td>`;}

  window.sortBy=function(key){if(sortCol===key)sortDir*=-1;else{sortCol=key;sortDir=-1;}const tb=document.getElementById('tableBody');if(tb)tb.innerHTML=makeRows(getSorted());document.querySelectorAll('.data-table th').forEach((th,i)=>{const c=cols[i];th.className=c.key===sortCol?'sorted':'';th.innerHTML=c.label+(c.key===sortCol?(sortDir>0?' ↑':' ↓'):'');if(c.sort)th.onclick=()=>sortBy(c.key);});};
  const thead=cols.map(c=>`<th class="${c.key===sortCol?'sorted':''}" ${c.sort?`onclick="sortBy('${c.key}')"`:''} style="${c.sort?'':'cursor:default'}">${c.label}${c.key===sortCol?(sortDir>0?' ↑':' ↓'):''}</th>`).join('');
  const wi=wavg('income'), wp=wavg('poverty');
  document.getElementById('dataContent').innerHTML=`
    <h3>${selectedSites.length} site${selectedSites.length!==1?'s':''} · ${bufferMiles}-mi buffer · ${data.length} counties
      <button class="copy-btn" onclick="copyTable()">Copy TSV</button>
    </h3>
    <div style="background:#E6F1FB;border:1px solid #B5D4F4;border-radius:6px;padding:9px 12px;margin-bottom:12px;font-size:11px;line-height:1.6;font-family:var(--mono)">
      <strong style="color:#0C447C">HUD CDBG/EDI LMI National Objective — 51% threshold</strong><br>
      <span style="color:#185FA5">Service Area method:</span> ≥51% of residents in service area must be LMI (below 80% AMI) · 
      <span style="color:#185FA5">Job Creation method:</span> ≥51% of jobs available to LMI persons · 
      <span style="color:#185FA5">Limited Clientele:</span> project exclusively serves LMI-qualified group (disabled, homeless, seniors)
    </div>
    <div class="summary-cards">
      <div class="scard"><div class="scard-n">${data.length}</div><div class="scard-l">Counties in service area</div></div>
      <div class="scard"><div class="scard-n">${(totalPop/1000000).toFixed(2)}M</div><div class="scard-l">Total population</div></div>
      <div class="scard"><div class="scard-n">${wi?'$'+Math.round(wi/1000)+'k':'—'}</div><div class="scard-l">Wtd. avg median income</div></div>
      <div class="scard"><div class="scard-n">${wp?wp.toFixed(1)+'%':'—'}</div><div class="scard-l">Wtd. avg poverty rate</div></div>
      \${(()=>{
        const v=wavg('lmi_pct');
        const pass=v!=null&&v>=51;
        const bg=v==null?'var(--paper2)':pass?'#EAF3DE':'#FCEBEB';
        const bc=v==null?'var(--border)':pass?'#3B6D11':'#A32D2D';
        const note=v==null?'':pass?'<span style="color:#3B6D11;font-size:9px">✓ Meets 51% threshold</span>':'<span style="color:#A32D2D;font-size:9px">✗ Below 51% threshold</span>';
        return '<div class="scard" style="background:'+bg+';border-color:'+bc+'"><div class="scard-n">'+(v!=null?v.toFixed(1)+'%':'—')+'</div><div class="scard-l">Wtd. avg LMI (80% AMI)<br>'+note+'</div></div>';
      })()}
    </div>
    <div style="overflow-x:auto"><table class="data-table"><thead><tr>${thead}</tr></thead><tbody id="tableBody">${makeRows(getSorted())}</tbody></table></div>`;
}

window.copyTable=function(){
  if(!lastResults)return;
  const headers=['County','Med. Income','Poverty %','Unemp. %','No Internet %','Renter %','Age 65+ %','Non-white %','AIAN %','Hispanic %','Black/AA %','Asian %','51% Test','LMI % (80%AMI)','Very LMI % (50%AMI)','LMI Households','80% AMI Threshold','Population','Sites'];
  const rows=lastResults.map(c=>[c.name,c.income?'$'+Math.round(c.income):'',c.poverty?c.poverty.toFixed(1)+'%':'',c.unemployed?c.unemployed.toFixed(1)+'%':'',c.no_internet?c.no_internet.toFixed(1)+'%':'',c.renter?c.renter.toFixed(1)+'%':'',c.age65?c.age65.toFixed(1)+'%':'',c.nonwhite?c.nonwhite.toFixed(1)+'%':'',c.aian?c.aian.toFixed(2)+'%':'',c.hispanic?c.hispanic.toFixed(1)+'%':'',c.black?c.black.toFixed(1)+'%':'',c.asian?c.asian.toFixed(1)+'%':'',c.lmi_pass||'',c.lmi_pct?c.lmi_pct.toFixed(1)+'%':'',c.vlmi_pct?c.vlmi_pct.toFixed(1)+'%':'',c.lmi_hh||'',c.ami80?'$'+c.ami80:'',c.pop,c.sites.join('; ')]);
  navigator.clipboard.writeText([headers,...rows].map(r=>r.join('\t')).join('\n')).then(()=>{const b=document.querySelector('.copy-btn');if(b){b.textContent='Copied!';setTimeout(()=>b.textContent='Copy TSV',1500);}});
};

buildSidebar();
updateCount();
</script>
</body>
</html>
