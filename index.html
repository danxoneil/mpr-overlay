<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPR Infrastructure Site Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--ink2:#555;--ink3:#888;
  --paper:#f7f5f0;--paper2:#edeae3;--paper3:#e2dfd7;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --red:#A32D2D;--border:1px solid #d0cdc5;
  --radius:6px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px}
header{background:var(--ink);padding:12px 20px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
header h1{font-family:var(--mono);font-size:14px;font-weight:600;color:#fff;letter-spacing:.04em}
header p{font-family:var(--mono);font-size:11px;color:#888}
.app{display:grid;grid-template-columns:270px 1fr;height:calc(100vh - 43px);overflow:hidden}
.sidebar{background:var(--paper2);border-right:var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:10px 14px;border-bottom:var(--border)}
.sidebar-section label{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px;font-family:var(--mono)}
.buffer-row{display:flex;align-items:center;gap:8px}
.buffer-row input[type=range]{flex:1;accent-color:var(--blue)}
.buffer-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--blue);min-width:45px;text-align:right}
.metric-select{width:100%;padding:6px 8px;border-radius:var(--radius);border:var(--border);background:var(--paper);font-size:12px;font-family:var(--mono);color:var(--ink);cursor:pointer}
.sites-list{flex:1;overflow-y:auto;padding:6px}
.region-group{margin-bottom:2px}
.region-label{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;padding:5px 8px 2px;font-family:var(--mono)}
.site-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:var(--radius);cursor:pointer;transition:background .12s}
.site-item:hover{background:var(--paper3)}
.site-item.checked{background:var(--blue-light)}
.site-item input[type=checkbox]{accent-color:var(--blue);width:12px;height:12px;flex-shrink:0;cursor:pointer}
.site-name{font-size:11px;font-weight:500;color:var(--ink);line-height:1.3}
.site-call{font-family:var(--mono);font-size:9px;color:var(--ink3)}
.svc-dots{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.svc-dot{width:5px;height:5px;border-radius:50%}
.select-actions{padding:8px 14px;border-top:var(--border);display:flex;gap:6px;flex-shrink:0}
.btn-sm{flex:1;padding:6px 8px;border-radius:var(--radius);border:var(--border);background:var(--paper);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--mono);color:var(--ink2);transition:background .12s}
.btn-sm:hover{background:var(--paper3)}
.btn-run{background:var(--blue);color:#fff;border-color:var(--blue);flex:2}
.btn-run:hover{background:var(--blue-dark)}
.main{display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:var(--border);background:var(--paper2);flex-shrink:0}
.tab{padding:9px 16px;font-size:11px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--ink3);font-family:var(--mono);transition:all .12s;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--paper)}
.panel{display:none;flex:1;overflow:auto;flex-direction:column}
.panel.active{display:flex}
.map-container{position:relative;flex:1;background:#ddd9d0;min-height:300px}
.map-container svg{width:100%;height:100%;display:block}
.map-tip{position:absolute;background:var(--paper);border:var(--border);border-radius:var(--radius);padding:9px 12px;font-size:11px;pointer-events:none;display:none;z-index:20;max-width:220px;box-shadow:0 2px 10px rgba(0,0,0,.14);line-height:1.7}
.map-tip strong{display:block;font-size:12px;margin-bottom:4px;font-family:var(--mono);border-bottom:var(--border);padding-bottom:4px;margin-bottom:5px}
.map-tip .tip-row{display:flex;justify-content:space-between;gap:12px;font-size:10px}
.map-tip .tip-label{color:var(--ink3)}
.map-tip .tip-val{font-family:var(--mono);font-weight:500;color:var(--ink)}
.map-legend{display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:var(--border);background:var(--paper2);flex-wrap:wrap;flex-shrink:0}
.legend-label{font-size:10px;color:var(--ink3);font-family:var(--mono)}
.legend-bar{display:flex;height:8px;border-radius:3px;overflow:hidden;width:100px}
.legend-seg{flex:1}
.legend-ends{display:flex;justify-content:space-between;width:100px;font-size:9px;color:var(--ink3);font-family:var(--mono);margin-top:2px}
.data-panel{padding:16px;flex:1;overflow:auto}
.data-panel h3{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.summary-cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-bottom:14px}
.scard{background:var(--paper2);border:var(--border);border-radius:var(--radius);padding:9px 11px}
.scard-n{font-size:18px;font-weight:600;color:var(--ink);font-family:var(--mono)}
.scard-l{font-size:9px;color:var(--ink3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;line-height:1.4}
.data-table{width:100%;border-collapse:collapse;font-size:11px}
.data-table th{text-align:left;font-weight:600;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);padding:6px 8px;border-bottom:2px solid var(--paper3);background:var(--paper);position:sticky;top:0;white-space:nowrap;cursor:pointer}
.data-table th:hover{color:var(--blue)}
.data-table th.sorted{color:var(--blue)}
.data-table td{padding:6px 8px;border-bottom:var(--border);vertical-align:middle;white-space:nowrap}
.data-table tr:hover td{background:var(--blue-light)}
.bar-wrap{width:60px;height:5px;background:var(--paper3);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
.bar-fill{height:100%;border-radius:3px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink3);gap:10px;font-family:var(--mono);font-size:12px}
.empty-icon{font-size:32px;opacity:.25}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;font-family:var(--mono);font-size:12px;color:var(--ink3)}
.spinner{width:20px;height:20px;border:2px solid var(--paper3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.loading-msg{font-size:11px;color:var(--ink3)}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fcebeb;border:1px solid #f09595;border-radius:var(--radius);padding:12px 14px;font-size:11px;color:var(--red);font-family:var(--mono);line-height:1.6;margin:16px}
.copy-btn{padding:4px 10px;border-radius:var(--radius);border:var(--border);background:var(--paper);font-size:10px;cursor:pointer;font-family:var(--mono);color:var(--ink2);float:right}
.copy-btn:hover{background:var(--paper3)}
.site-count{font-size:10px;font-family:var(--mono);color:var(--ink3);padding:4px 14px;border-bottom:var(--border)}
@media(max-width:700px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr}.sidebar{max-height:45vh}.summary-cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <h1>MPR Infrastructure Site Analysis</h1>
  <p>ACS 2022 5-Year Estimates · County-level demographics · FY2027 Congressionally Directed Funding</p>
</header>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-section">
      <label>Coverage buffer radius</label>
      <div class="buffer-row">
        <input type="range" id="bufferRange" min="10" max="75" value="30" step="5">
        <span class="buffer-val" id="bufferVal">30 mi</span>
      </div>
    </div>
    <div class="sidebar-section">
      <label>Map color metric</label>
      <select class="metric-select" id="metricSelect">
        <option value="income">Median household income</option>
        <option value="poverty">Poverty rate</option>
        <option value="no_internet">No internet access (%)</option>
        <option value="disability">Disability rate (%)</option>
        <option value="no_hs">No high school diploma (%)</option>
        <option value="unemployed">Unemployment rate (%)</option>
        <option value="uninsured">Uninsured rate (%)</option>
        <option value="renter">Renter-occupied housing (%)</option>
        <option value="age65">Population age 65+ (%)</option>
        <option value="nonwhite">Non-white population (%)</option>
        <optgroup label="── Ethnicity detail ──" disabled></optgroup>
        <option value="aian">American Indian / Alaska Native (%)</option>
        <option value="hispanic">Hispanic or Latino (%)</option>
        <option value="black">Black / African American (%)</option>
        <option value="asian">Asian (%)</option>
      </select>
    </div>
    <div class="site-count" id="siteCount">0 sites selected</div>
    <div class="sites-list" id="sitesList"></div>
    <div class="select-actions">
      <button class="btn-sm" onclick="selectAll()">All</button>
      <button class="btn-sm" onclick="clearAll()">None</button>
      <button class="btn-sm btn-run" onclick="runAnalysis()">Analyze ↗</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs">
      <div class="tab active" onclick="showTab('map')">Map view</div>
      <div class="tab" onclick="showTab('data')">Data table</div>
    </div>
    <div class="panel active" id="panel-map">
      <div class="map-container" id="mapContainer">
        <div class="empty-state" id="mapEmpty"><div class="empty-icon">◎</div><div>Select sites and click Analyze</div></div>
        <svg id="mapSvg" style="display:none"></svg>
        <div class="map-tip" id="mapTip"></div>
      </div>
      <div class="map-legend" id="mapLegend" style="display:none">
        <span class="legend-label" id="legendTitle">Median HH income</span>
        <div><div class="legend-bar" id="legendBar"></div><div class="legend-ends"><span id="legendLow"></span><span id="legendHigh"></span></div></div>
        <span style="margin-left:6px;font-size:10px;color:var(--ink3);font-family:var(--mono)">● site &nbsp; ◌ buffer &nbsp; <span style="color:#d4d0c8">■</span> outside range</span>
      </div>
    </div>
    <div class="panel" id="panel-data">
      <div class="data-panel" id="dataContent">
        <div class="empty-state"><div class="empty-icon">▦</div><div>Run analysis to see county data</div></div>
      </div>
    </div>
  </div>
</div>

<script>

let selected=new Set(), bufferMiles=30, lastResults=null, sortCol='income', sortDir=-1;

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSidebar(){
  const el=document.getElementById('sitesList'); el.innerHTML='';
  REGIONS.forEach(region=>{
    const sites=SITES.filter(s=>s.region===region);
    const grp=document.createElement('div'); grp.className='region-group';
    grp.innerHTML=`<div class="region-label">${region}</div>`;
    sites.forEach(site=>{
      const item=document.createElement('div');
      item.className='site-item'+(selected.has(site.id)?' checked':'');
      item.id='item-'+site.id;
      const dots=site.svcs.map(s=>`<span class="svc-dot" style="background:${SVC_COLOR[s]}"></span>`).join('');
      item.innerHTML=`<input type="checkbox" ${selected.has(site.id)?'checked':''}><div><div class="site-name">${site.city}</div><div class="site-call">${site.calls.join(' · ')}</div></div><div class="svc-dots">${dots}</div>`;
      item.querySelector('input').addEventListener('change',e=>toggleSite(site.id,e.target.checked));
      grp.appendChild(item);
    });
    el.appendChild(grp);
  });
}
function toggleSite(id,checked){
  checked?selected.add(id):selected.delete(id);
  const el=document.getElementById('item-'+id);
  if(el){el.className='site-item'+(checked?' checked':'');}
  updateCount();
}
function updateCount(){document.getElementById('siteCount').textContent=`${selected.size} site${selected.size!==1?'s':''} selected`;}
function selectAll(){SITES.forEach(s=>{selected.add(s.id);const el=document.getElementById('item-'+s.id);if(el){el.className='site-item checked';el.querySelector('input').checked=true;}});updateCount();}
function clearAll(){SITES.forEach(s=>{selected.delete(s.id);const el=document.getElementById('item-'+s.id);if(el){el.className='site-item';el.querySelector('input').checked=false;}});updateCount();}
document.getElementById('bufferRange').addEventListener('input',function(){bufferMiles=+this.value;document.getElementById('bufferVal').textContent=bufferMiles+' mi';});
document.getElementById('metricSelect').addEventListener('change',function(){if(lastResults)redrawMap(SITES.filter(s=>selected.has(s.id)),lastResults);});

function showTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['map','data'][i]===tab));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',['panel-map','panel-data'][i]==='panel-'+tab));
}

// ── CENSUS FETCH ──────────────────────────────────────────────────────────────
function pointInCircle(lat,lon,cLat,cLon,mi){
  const R=3958.8,dLa=(lat-cLat)*Math.PI/180,dLo=(lon-cLon)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(cLat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))<=mi;
}
function milesToDeg(m){return m/69;}

function parseCounty(row, headers){
  function g(name){const i=headers.indexOf(name);return i>=0?parseFloat(row[i]):0;}
  const pop=g('B01003_001E');
  const income=g('B19013_001E');
  const pov_u=g('B17001_001E'), pov_b=g('B17001_002E');
  const m65=g('B01001_020E')+g('B01001_021E')+g('B01001_022E')+g('B01001_023E')+g('B01001_024E')+g('B01001_025E');
  const f65=g('B01001_044E')+g('B01001_045E')+g('B01001_046E')+g('B01001_047E')+g('B01001_048E')+g('B01001_049E');
  const internet_u=g('B28002_001E'), no_internet=g('B28002_013E');
  const dis_u=g('B18101_001E');
  const dis_m=g('B18101_004E')+g('B18101_007E')+g('B18101_010E')+g('B18101_013E')+g('B18101_016E')+g('B18101_019E');
  const dis_f=g('B18101_023E')+g('B18101_026E')+g('B18101_029E')+g('B18101_032E')+g('B18101_035E')+g('B18101_038E');
  const edu_u=g('B15003_001E');
  const no_hs=['B15003_002E','B15003_003E','B15003_004E','B15003_005E','B15003_006E','B15003_007E','B15003_008E','B15003_009E','B15003_010E','B15003_011E','B15003_012E','B15003_013E','B15003_014E','B15003_015E','B15003_016E'].reduce((s,v)=>s+g(v),0);
  const labor_u=g('B23025_001E'), unemployed=g('B23025_005E');
  const ins_u=g('B27010_001E');
  const uninsured=g('B27010_017E')+g('B27010_033E')+g('B27010_050E')+g('B27010_066E');
  const housing_u=g('B25003_001E'), renter=g('B25003_003E');
  const race_u=g('B03002_001E'), white_nh=g('B03002_003E');
  const black_nh=g('B03002_004E');
  const aian_nh=g('B03002_005E');
  const asian_nh=g('B03002_006E');
  const hispanic=g('B03002_012E');

  return {
    pop: Math.round(pop),
    income: income>0?income:null,
    poverty:    pov_u>0?pov_b/pov_u*100:null,
    age65:      pop>0?(m65+f65)/pop*100:null,
    no_internet:internet_u>0?no_internet/internet_u*100:null,
    disability: dis_u>0?(dis_m+dis_f)/dis_u*100:null,
    no_hs:      edu_u>0?no_hs/edu_u*100:null,
    unemployed: labor_u>0?unemployed/labor_u*100:null,
    uninsured:  ins_u>0?uninsured/ins_u*100:null,
    renter:     housing_u>0?renter/housing_u*100:null,
    nonwhite:   race_u>0?(race_u-white_nh)/race_u*100:null,
    aian:       race_u>0?aian_nh/race_u*100:null,
    hispanic:   race_u>0?hispanic/race_u*100:null,
    black:      race_u>0?black_nh/race_u*100:null,
    asian:      race_u>0?asian_nh/race_u*100:null,
  };
}

async function fetchCensusData(selectedSites,radiusMi){
  const vars=['NAME',...ACS_VARS].join(',');
  const url=`https://api.census.gov/data/2022/acs/acs5?get=${vars}&for=county:*&in=state:27&key=${CENSUS_KEY}`;
  const resp=await fetch(url);
  if(!resp.ok){const txt=await resp.text();throw new Error(`Census API ${resp.status}: ${txt.slice(0,120)}`);}
  const raw=await resp.json();
  const headers=raw[0];
  const countyI=headers.indexOf('county');
  const nameI=headers.indexOf('NAME');
  const results=[];
  raw.slice(1).forEach(row=>{
    const fips=row[countyI];
    const name=row[nameI].replace(', Minnesota','');
    const centroid=MN_COUNTY_CENTROIDS[fips];
    if(!centroid)return;
    const [cLat,cLon]=centroid;
    const matchedSites=selectedSites.filter(s=>pointInCircle(cLat,cLon,s.lat,s.lon,radiusMi));
    if(matchedSites.length===0)return;
    const demo=parseCounty(row,headers);
    results.push({name,fips,sites:matchedSites.map(s=>s.city),...demo});
  });
  return results;
}

// ── ANALYSIS RUNNER ───────────────────────────────────────────────────────────
async function runAnalysis(){
  if(selected.size===0){alert('Please select at least one site.');return;}
  const selectedSites=SITES.filter(s=>selected.has(s.id));
  showTab('map');
  document.getElementById('mapEmpty').style.display='none';
  document.getElementById('mapSvg').style.display='none';
  document.getElementById('mapLegend').style.display='none';
  const container=document.getElementById('mapContainer');
  let loadDiv=document.getElementById('mapLoading');
  if(!loadDiv){loadDiv=document.createElement('div');loadDiv.id='mapLoading';loadDiv.className='loading-state';loadDiv.innerHTML='<div class="spinner"></div><div class="loading-msg">Fetching Census ACS 2022 data…</div>';container.appendChild(loadDiv);}
  loadDiv.style.display='flex';
  document.getElementById('dataContent').innerHTML='<div class="loading-state" style="height:200px"><div class="spinner"></div><div class="loading-msg">Loading…</div></div>';
  try{
    const countyData=await fetchCensusData(selectedSites,bufferMiles);
    lastResults=countyData;
    loadDiv.style.display='none';
    redrawMap(selectedSites,countyData);
    renderTable(selectedSites,countyData);
  }catch(e){
    loadDiv.style.display='none';
    document.getElementById('mapEmpty').style.display='flex';
    document.getElementById('mapEmpty').innerHTML=`<div class="empty-icon" style="font-size:22px;opacity:.4">!</div><div style="color:#A32D2D;font-family:var(--mono);font-size:11px;text-align:center;max-width:280px">Census API error:<br>${e.message}</div>`;
    document.getElementById('dataContent').innerHTML=`<div class="error-box">Census API error: ${e.message}</div>`;
  }
}

// ── MAP ───────────────────────────────────────────────────────────────────────
function redrawMap(selectedSites,countyData){
  const metricKey=document.getElementById('metricSelect').value;
  const mc=METRIC_CONFIG[metricKey];
  const svgEl=document.getElementById('mapSvg');
  svgEl.style.display='block';
  const container=document.getElementById('mapContainer');
  const W=container.offsetWidth||700,H=container.offsetHeight||440;
  svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const svg=d3.select('#mapSvg'); svg.selectAll('*').remove();
  const proj=d3.geoMercator().center([-93.0,46.2]).scale(3800*(W/740)).translate([W/2,H/2]);
  const path=d3.geoPath(proj);
  const vals=countyData.map(c=>c[metricKey]).filter(v=>v!=null);
  const vMin=d3.min(vals)||0, vMax=d3.max(vals)||1;
  const colorScale=d3.scaleSequential([vMin,vMax],mc.scheme);

  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json').then(us=>{
    const features=topojson.feature(us,us.objects.counties).features;
    const mnFeatures=features.filter(f=>String(f.id).padStart(5,'0').startsWith('27'));
    svg.selectAll('.county').data(mnFeatures).join('path')
      .attr('d',path)
      .attr('fill',d=>{const fips=String(d.id).padStart(5,'0').slice(2);const cd=countyData.find(c=>c.fips===fips);return cd&&cd[metricKey]!=null?colorScale(cd[metricKey]):'#d4d0c8';})
      .attr('stroke','#fff').attr('stroke-width',0.5)
      .on('mousemove',function(e,d){
        const fips=String(d.id).padStart(5,'0').slice(2);
        const cd=countyData.find(c=>c.fips===fips);
        if(!cd)return;
        const tip=document.getElementById('mapTip');
        tip.style.display='block';
        const mx=e.offsetX,my=e.offsetY;
        tip.style.left=Math.min(mx+14,W-230)+'px';
        tip.style.top=Math.max(my-10,4)+'px';
        const rows=[
          ['Population',cd.pop.toLocaleString()],
          ['Median income',cd.income!=null?'$'+Math.round(cd.income).toLocaleString():'—'],
          ['Poverty rate',cd.poverty!=null?cd.poverty.toFixed(1)+'%':'—'],
          ['No internet',cd.no_internet!=null?cd.no_internet.toFixed(1)+'%':'—'],
          ['Disability',cd.disability!=null?cd.disability.toFixed(1)+'%':'—'],
          ['No HS diploma',cd.no_hs!=null?cd.no_hs.toFixed(1)+'%':'—'],
          ['Unemployed',cd.unemployed!=null?cd.unemployed.toFixed(1)+'%':'—'],
          ['Uninsured',cd.uninsured!=null?cd.uninsured.toFixed(1)+'%':'—'],
          ['Renter-occ.',cd.renter!=null?cd.renter.toFixed(1)+'%':'—'],
          ['Age 65+',cd.age65!=null?cd.age65.toFixed(1)+'%':'—'],
          ['Non-white',cd.nonwhite!=null?cd.nonwhite.toFixed(1)+'%':'—'],
          ['AIAN',cd.aian!=null?cd.aian.toFixed(2)+'%':'—'],
          ['Hispanic/Latino',cd.hispanic!=null?cd.hispanic.toFixed(1)+'%':'—'],
          ['Black/AA',cd.black!=null?cd.black.toFixed(1)+'%':'—'],
          ['Asian',cd.asian!=null?cd.asian.toFixed(1)+'%':'—'],
        ].map(([l,v])=>`<div class="tip-row"><span class="tip-label">${l}</span><span class="tip-val">${v}</span></div>`).join('');
        tip.innerHTML=`<strong>${cd.name} County</strong>${rows}<div style="margin-top:5px;font-size:9px;color:var(--ink3)">${cd.sites.join(', ')}</div>`;
      })
      .on('mouseleave',()=>{document.getElementById('mapTip').style.display='none';});

    selectedSites.forEach(site=>{
      const [cx,cy]=proj([site.lon,site.lat]);
      const r=Math.abs(proj([site.lon+milesToDeg(bufferMiles),site.lat])[0]-cx);
      svg.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r)
        .attr('fill','rgba(24,95,165,0.06)').attr('stroke','rgba(24,95,165,0.35)').attr('stroke-width',1).attr('stroke-dasharray','5,3');
    });
    selectedSites.forEach(site=>{
      const [cx,cy]=proj([site.lon,site.lat]);
      svg.append('circle').attr('cx',cx).attr('cy',cy).attr('r',site.flagship?9:6)
        .attr('fill',site.flagship?'#533AB7':'#185FA5').attr('stroke','#fff').attr('stroke-width',2);
      svg.append('text').attr('x',cx).attr('y',cy-12).attr('text-anchor','middle')
        .attr('font-size',9).attr('font-family',"'IBM Plex Mono',monospace").attr('fill','#1a1a1a').attr('font-weight',500)
        .text(site.city.split('/')[0]);
    });

    const bar=document.getElementById('legendBar'); bar.innerHTML='';
    for(let i=0;i<8;i++){const seg=document.createElement('div');seg.className='legend-seg';seg.style.background=colorScale(vMin+(vMax-vMin)*(i/7));bar.appendChild(seg);}
    document.getElementById('legendTitle').textContent=mc.label;
    document.getElementById('legendLow').textContent=mc.fmt(vMin);
    document.getElementById('legendHigh').textContent=mc.fmt(vMax);
    document.getElementById('mapLegend').style.display='flex';
  });
}

// ── TABLE ─────────────────────────────────────────────────────────────────────
function renderTable(selectedSites,countyData){
  if(!countyData.length){document.getElementById('dataContent').innerHTML='<div class="empty-state"><div class="empty-icon">▦</div><div>No counties in range.</div></div>';return;}
  const totalPop=countyData.reduce((s,c)=>s+c.pop,0);
  const avgIncome=countyData.reduce((s,c)=>s+(c.income||0)*c.pop,0)/totalPop;
  const avgPoverty=countyData.reduce((s,c)=>s+(c.poverty||0)*c.pop,0)/totalPop;
  const avgNoInternet=countyData.reduce((s,c)=>s+(c.no_internet||0)*c.pop,0)/totalPop;

  const cols=[
    {key:'name',      label:'County',         fmt:v=>v,           sort:true},
    {key:'income',    label:'Med. Income',     fmt:v=>v!=null?'$'+Math.round(v).toLocaleString():'—', sort:true},
    {key:'poverty',   label:'Poverty %',       fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'no_internet',label:'No Internet %',  fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'disability',label:'Disability %',    fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'no_hs',     label:'No HS %',         fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'unemployed',label:'Unemp. %',        fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'uninsured', label:'Uninsured %',     fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'renter',    label:'Renter %',        fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'age65',     label:'Age 65+ %',       fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'nonwhite',  label:'Non-white %',     fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'aian',      label:'AIAN %',          fmt:v=>v!=null?v.toFixed(2)+'%':'—', sort:true, bar:true},
    {key:'hispanic',  label:'Hispanic %',      fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'black',     label:'Black/AA %',      fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'asian',     label:'Asian %',         fmt:v=>v!=null?v.toFixed(1)+'%':'—', sort:true, bar:true},
    {key:'pop',       label:'Population',      fmt:v=>v.toLocaleString(), sort:true},
    {key:'sites',     label:'Serving site(s)', fmt:v=>v.join(', '),       sort:false},
  ];

  function getSorted(){
    return [...countyData].sort((a,b)=>{
      const av=a[sortCol],bv=b[sortCol];
      if(av==null)return 1;if(bv==null)return -1;
      if(typeof av==='string')return sortDir*av.localeCompare(bv);
      return sortDir*(av-bv);
    });
  }

  function buildMaxes(){
    const m={};
    cols.filter(c=>c.bar).forEach(c=>{m[c.key]=Math.max(...countyData.map(r=>r[c.key]||0));});
    return m;
  }

  function renderRows(sorted,maxes){
    return sorted.map(c=>`<tr>${cols.map(col=>{
      const v=c[col.key];
      const fmted=col.fmt(v);
      if(col.bar&&v!=null&&maxes[col.key]>0){
        const pct=Math.round(v/maxes[col.key]*100);
        return `<td><span class="bar-wrap"><span class="bar-fill" style="width:${pct}%;background:#185FA5"></span></span>${fmted}</td>`;
      }
      if(col.key==='name')return `<td style="font-weight:500">${fmted}</td>`;
      return `<td style="font-family:var(--mono);font-size:10px">${fmted}</td>`;
    }).join('')}</tr>`).join('');
  }

  function render(){
    const sorted=getSorted();
    const maxes=buildMaxes();
    const thead=cols.map(c=>`<th class="${c.key===sortCol?'sorted':''}" onclick="${c.sort?`sortBy('${c.key}')`:'void(0)'}" style="${c.sort?'':'cursor:default'}">${c.label}${c.key===sortCol?(sortDir>0?' ↑':' ↓'):''}</th>`).join('');
    document.getElementById('dataContent').innerHTML=`
      <h3>${selectedSites.length} site${selectedSites.length!==1?'s':''} · ${bufferMiles}-mi buffer · ${countyData.length} counties
        <button class="copy-btn" onclick="copyTable()">Copy TSV</button>
      </h3>
      <div class="summary-cards">
        <div class="scard"><div class="scard-n">${countyData.length}</div><div class="scard-l">Counties in service area</div></div>
        <div class="scard"><div class="scard-n">${(totalPop/1000000).toFixed(2)}M</div><div class="scard-l">Total population</div></div>
        <div class="scard"><div class="scard-n">$${Math.round(avgIncome/1000)}k</div><div class="scard-l">Wtd. avg median income</div></div>
        <div class="scard"><div class="scard-n">${avgPoverty.toFixed(1)}%</div><div class="scard-l">Wtd. avg poverty rate</div></div>
      </div>
      <div style="overflow-x:auto">
        <table class="data-table" id="resultsTable">
          <thead><tr>${thead}</tr></thead>
          <tbody id="tableBody">${renderRows(sorted,maxes)}</tbody>
        </table>
      </div>`;
  }

  window.sortBy=function(key){
    if(sortCol===key)sortDir*=-1;else{sortCol=key;sortDir=-1;}
    const sorted=getSorted();
    const maxes=buildMaxes();
    const tbody=document.getElementById('tableBody');
    if(tbody)tbody.innerHTML=renderRows(sorted,maxes);
    document.querySelectorAll('.data-table th').forEach((th,i)=>{
      th.className=cols[i].key===sortCol?'sorted':'';
      th.textContent=cols[i].label+(cols[i].key===sortCol?(sortDir>0?' ↑':' ↓'):'');
      if(cols[i].sort)th.onclick=()=>sortBy(cols[i].key);
    });
  };

  render();
}

window.copyTable=function(){
  if(!lastResults)return;
  const headers=['County','Med. Income','Poverty %','No Internet %','Disability %','No HS %','Unemp. %','Uninsured %','Renter %','Age 65+ %','Non-white %','AIAN %','Hispanic %','Black/AA %','Asian %','Population','Sites'];
  const rows=lastResults.map(c=>[
    c.name,
    c.income!=null?'$'+Math.round(c.income):'',
    c.poverty!=null?c.poverty.toFixed(1)+'%':'',
    c.no_internet!=null?c.no_internet.toFixed(1)+'%':'',
    c.disability!=null?c.disability.toFixed(1)+'%':'',
    c.no_hs!=null?c.no_hs.toFixed(1)+'%':'',
    c.unemployed!=null?c.unemployed.toFixed(1)+'%':'',
    c.uninsured!=null?c.uninsured.toFixed(1)+'%':'',
    c.renter!=null?c.renter.toFixed(1)+'%':'',
    c.age65!=null?c.age65.toFixed(1)+'%':'',
    c.nonwhite!=null?c.nonwhite.toFixed(1)+'%':'',
    c.aian!=null?c.aian.toFixed(2)+'%':'',
    c.hispanic!=null?c.hispanic.toFixed(1)+'%':'',
    c.black!=null?c.black.toFixed(1)+'%':'',
    c.asian!=null?c.asian.toFixed(1)+'%':'',
    c.pop,
    c.sites.join('; ')
  ]);
  const tsv=[headers,...rows].map(r=>r.join('\t')).join('\n');
  navigator.clipboard.writeText(tsv).then(()=>{
    const btn=document.querySelector('.copy-btn');
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy TSV',1500);}
  });
};

buildSidebar();
updateCount();
